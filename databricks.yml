# geniefy-lite — Databricks Asset Bundle
# Deploys the geniefy App + resources. Fully parameterized: supply your workspace
# host via -p <cli-profile> or DATABRICKS_HOST, and pass --var warehouse_id=<id>.
# Use ./deploy.sh rather than calling `databricks bundle` directly — it handles
# the frontend build, Lakebase provisioning, migrations, and grants.
bundle:
  name: geniefy-v3

# Dev-only tooling is excluded from bundle uploads:
# .gotm/ (orchestration) and .claude/ (AI session files) are contributor tools.
# 
sync:
  # Force-include gitignored build artifacts: deploy.sh copies geniefy_core/geniefy_app into
  # app/ and builds the SPA into app/static/ — both are gitignored but must be uploaded.
  include:
    - app/geniefy_core/**
    - app/geniefy_app/**
    - app/static/**          # the built SPA (vite build) — gitignored, but the App serves it at /
  exclude:
    - .gotm/
    - .claude/

variables:
  host:
    # Informational only — the actual deploy host comes from the CLI profile (-p) or
    # DATABRICKS_HOST (auth fields can't interpolate ${var}). Documents the dev default;
    # deploy.sh --host exports DATABRICKS_HOST for you.
    description: Databricks workspace URL — set via CLI profile (-p) or DATABRICKS_HOST env var
    default: ""  # Required: set via --host or DATABRICKS_HOST
  catalog:
    description: UC catalog for the app's Lakebase-backed data + objects
    default: <your-catalog>
  schema:
    description: schema for geniefy objects
    default: geniefy
  warehouse_id:
    description: SQL warehouse for profiling + the apply write-path
    default: ""  # Required: set your SQL warehouse ID here, or pass --var warehouse_id=<id> to deploy.sh
  model_endpoint:
    description: FMAPI Claude serving endpoint used for generation (Reasoner/Judge)
    default: databricks-claude-sonnet-4-6
  demo_catalog:
    description: catalog containing demo tables to document
    default: samples
  lakebase_instance:
    description: Lakebase Autoscaling project name (= `projects/<name>`; provisioned by deploy.sh)
    default: geniefy
  pg_host:
    description: Lakebase endpoint host injected into the app (GENIEFY_PG_HOST). deploy.sh
      resolves the live endpoint host and passes --var pg_host; this dev default is the
      `projects/geniefy` production/primary endpoint.
    default: <your-lakebase-endpoint-host>

targets:
  dev:
    mode: development
    default: true
    # NB: workspace host is intentionally NOT set here — Databricks auth fields cannot use
    # ${var} interpolation. Provide it via the CLI profile or DATABRICKS_HOST, e.g.
    #   databricks bundle deploy -t dev -p <your-profile>
    #   ./deploy.sh -t dev -p <your-profile>     # (--host exports DATABRICKS_HOST)

  prod:
    mode: production
    workspace:
      # production mode requires an explicit root_path (single-copy guard). Scope it to the
      # deploying principal's home so it isn't world-writable (the /Workspace/Shared default
      # triggers a "writable by all users" warning). NB: host/auth still come from the
      # profile or DATABRICKS_HOST, not here.
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    # Supply the workspace host and auth via your CLI profile (-p) or DATABRICKS_HOST:
    #   ./deploy.sh -t prod --host https://<your-workspace> -p <your-profile>
    # All other values are bundle variables, overridable per target or with --var.

resources:
  apps:
    geniefy:
      name: geniefy-${bundle.target}
      description: "geniefy-v3 — agentic Unity Catalog table documentation (AI/Genie-ready comments)"
      source_code_path: ./app
      # Resource bindings inject env vars into the app at runtime. `app.yaml`'s
      # `valueFrom: sql-warehouse` binds GENIEFY_WAREHOUSE_ID. Lakebase is wired via
      # the `pg_host` bundle var + the backend's own OAuth (`api.py _lakebase_connection`);
      # deploy.sh grants the app SP a Postgres role on the branch.
      resources:
        - name: sql-warehouse
          description: SQL warehouse for profiling + the apply write-path
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE

  jobs:
    # One-shot, idempotent migration job: applies migrations/*.sql to the Lakebase `geniefy`
    # database via migrations/run_migrations.py. Run after deploy:
    #   databricks bundle run geniefy_setup -t <target>
    geniefy_setup:
      name: geniefy-setup-${bundle.target}
      description: "Apply migrations/ to the Lakebase geniefy database (idempotent, re-runnable)."
      tasks:
        - task_key: migrate
          spark_python_task:
            python_file: ./migrations/run_migrations.py
            # run_migrations reads the branch from argv[1]; deploy.sh --use-job passes it via --params.
            parameters:
              - "{{job.parameters.lakebase_branch}}"
          environment_key: migrate
      environments:
        - environment_key: migrate
          spec:
            client: "2"
            dependencies:
              - psycopg2-binary
      parameters:
        - name: lakebase_branch
          default: production
