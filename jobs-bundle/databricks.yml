# geniefy-jobs — separate DAB bundle for the hands-off schema-run Job.
#
# Why its own bundle: deploying a job that lives in the app bundle requires `bundle deploy`,
# which reconciles the app's resources to databricks.yml and removes UI-added bindings
# (Lakebase postgres, fmapi-endpoint), dropping the SP's Lakebase role and grants. This
# bundle's only resource is the job, so `bundle deploy` here never touches the app.
#
# Code is staged into this dir by ../deploy_jobs.sh (geniefy_core/geniefy_app/schema_run_entry.py
# copied in, mirroring how deploy.sh stages app/), so the bundle is self-contained.
bundle:
  name: geniefy-jobs

# Run the Job as the app SP so it reads Lakebase/warehouse/FMAPI with the same identity the app uses.
# Replace the service_principal_name values below with your app's service principal name or client ID.
run_as:
  service_principal_name: <your-app-service-principal>

# The SP (run_as) must be able to read the staged entrypoint.
permissions:
  - level: CAN_MANAGE
    service_principal_name: <your-app-service-principal>

sync:
  # The staged core is a gitignored build artifact — force-include so it uploads.
  include:
    - geniefy_core/**
    - geniefy_app/**
    - schema_run_entry.py

variables:
  warehouse_id:
    description: SQL warehouse for profiling (SP reads)
    default: ""
  model_endpoint:
    description: FMAPI Claude serving endpoint for generation
    default: databricks-claude-sonnet-4-6
  pg_host:
    description: Lakebase PRODUCTION endpoint host — the Job uses the stable production branch.
      deploy_jobs.sh resolves and passes this automatically.
    default: <your-lakebase-endpoint-host>
  pg_database:
    default: geniefy
  lakebase_endpoint:
    description: Lakebase endpoint path for minting the cluster DB credential (production branch)
    default: projects/geniefy/branches/production/endpoints/primary

targets:
  dev:
    mode: development
    default: true
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/geniefy-jobs/prod

resources:
  jobs:
    geniefy_schema_run:
      name: geniefy-schema-run-${bundle.target}
      description: "Hands-off schema documentation — enumerate a schema + generate per-table comments (never applies to UC)."
      permissions:
        - level: CAN_MANAGE_RUN
          service_principal_name: <your-app-service-principal>
      tasks:
        - task_key: schema_run
          spark_python_task:
            python_file: ./schema_run_entry.py
            parameters:
              - "{{job.parameters.schema_run_id}}"
              - "{{job.parameters.catalog}}"
              - "{{job.parameters.schema}}"
              - "{{job.parameters.filters}}"
              - "{{job.parameters.model_endpoint}}"
              - "{{job.parameters.warehouse_id}}"
              - "{{job.parameters.pg_host}}"
              - "{{job.parameters.pg_database}}"
              - "{{job.parameters.lakebase_endpoint}}"
          environment_key: schema_run
      environments:
        - environment_key: schema_run
          spec:
            client: "2"
            dependencies:
              - psycopg2-binary
              - databricks-sdk
              - openai
              - pyyaml
      parameters:
        - name: schema_run_id
          default: ""
        - name: catalog
          default: ""
        - name: schema
          default: ""
        - name: filters
          default: "{}"
        - name: model_endpoint
          default: ${var.model_endpoint}
        - name: warehouse_id
          default: ${var.warehouse_id}
        - name: pg_host
          default: ${var.pg_host}
        - name: pg_database
          default: geniefy
        - name: lakebase_endpoint
          default: ${var.lakebase_endpoint}
