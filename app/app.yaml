# Databricks App config for geniefy-lite.
# The FastAPI backend reads these GENIEFY_* env vars once at startup (AppConfig.from_env)
# and fails fast on a bad/missing required one. Edit here to choose the model and add MCP
# context providers — the agent discovers them at deployment. The built React SPA is served from `/`.
command:
  - uvicorn
  - main:app
  - --host
  - "0.0.0.0"
  - --port
  - "8000"

env:
  - name: GENIEFY_ENV
    value: databricks-app

  # ── Model (FMAPI Claude) — choose the serving endpoint here ────────────────────────────
  - name: GENIEFY_MODEL_ENDPOINT
    value: databricks-claude-sonnet-4-6   # or databricks-claude-opus-4-8 for max-quality comments

  # ── Infra — bound at deploy from databricks.yml vars / app resource bindings ───────────
  - name: GENIEFY_WAREHOUSE_ID
    valueFrom: sql-warehouse              # app resource binding (the bound SQL warehouse)
  - name: GENIEFY_PG_HOST
    # Lakebase PRODUCTION-branch endpoint host. deploy.sh resolves this and passes it as
    # --var pg_host=<host> to bundle deploy, which injects it here. DAB does not
    # ${var}-substitute app.yaml env values, so this must be a literal string.
    # The production branch host is stable; the dev-branch host can churn.
    value: <your-lakebase-endpoint-host>  # set by deploy.sh — do not edit manually
  - name: GENIEFY_PG_DATABASE
    value: geniefy                        # working-store database
  - name: GENIEFY_PG_SCHEMA
    value: geniefy
  - name: GENIEFY_SECRET_SCOPE
    value: geniefy                        # holds MCP provider tokens

  # ── Pluggable MCP context providers ──────────────────────────────────────────────────
  # A JSON array; one object per server. The agent discovers + queries these at deployment
  # (Glean / Confluence / Atlassian / Genie / custom). Auth is a secret-scope reference,
  # never a raw token. Add or remove servers here, then redeploy.
  - name: GENIEFY_MCP_PROVIDERS
    value: |
      [
        {
          "name": "glean",
          "server_url": "https://<workspace-host>/api/2.0/mcp/glean",
          "transport": "streamable_http",
          "auth": {"secret_scope": "geniefy", "key": "glean_token"},
          "tool_allowlist": ["search"],
          "query_template": "table {full_name}: {column_terms}",
          "max_snippets": 8
        }
      ]

  # ── Agent tunables (all optional, sensible defaults in AppConfig) ────────────────────
  - name: GENIEFY_KEEP_THRESHOLD
    value: "0.75"
  - name: GENIEFY_MAX_INPUT_TOKENS_PER_CALL
    value: "12000"                        # per-call token budget

  # ── LLM + per-phase comment tunables — change here, no code change needed ─────────────
  - name: GENIEFY_MAX_RETRIES
    value: "5"                            # 429/rate-limit retry budget
  - name: GENIEFY_BACKOFF_BASE
    value: "0.5"                          # full-jitter backoff base seconds
  - name: GENIEFY_LLM_TEMPERATURE
    value: "0.0"                          # deterministic drafts
  - name: GENIEFY_MAX_TOKENS
    value: "4096"                         # default per-call output cap
  - name: GENIEFY_REASON_TABLE_MAX_TOKENS
    value: "20000"                        # richer table comment output cap
  - name: GENIEFY_REASON_COLUMN_MAX_TOKENS
    value: "20000"                        # per column-batch output cap; generous budget prevents
                                          # truncation on wide tables with long column descriptions
